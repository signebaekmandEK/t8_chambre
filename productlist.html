<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product List</title>
    <link rel="stylesheet" href="https://use.typekit.net/mhr3fgo.css">
    <link rel="stylesheet" href="css/generel.css">
    <link rel="stylesheet" href="css/burger.css">
    <link rel="stylesheet" href="css/productlist.css">
</head>

<body>
    <header>
        <div class="logo">
            <a href="index.html">
                <img src="SVG/logochambre.svg" alt="Logo">
            </a>
        </div>
        <nav>
            <ul class="menu">
                <li><a href="productlist.html">PRODUCTS</a></li>
                <li><a href="inspiration.html">INSPIRATION</a></li>
                <li><a href="aboutus.html">ABOUT US</a></li>
            </ul>

            <button class="burger">
                <span class="line"></span>
                <span class="line"></span>
                <span class="line"></span>
            </button>
        </nav>
    </header>

    <main id="productContainer">

        <img src="billeder/stue4 1.webp" alt="Furniture" id="furniture">

        <div class="intro-productlist">
            <div>
                <h2>Furniture</h2>
                <p>Mangler du inspiration til at sætte det hele sammen derhjemme, så tjek vores inspo side.</p>
            </div>
            <div class="feature-gridbox">

                <div class="filterbtn_productlist">
                    <div class="filter">
                        <h3>Filter</h3>
                        <button id="filterWomenBtn" class="filter-btn">Color</button>
                        <button id="filterWomenBtn" class="filter-btn">Material</button>
                        <button id="filterWomenBtn" class="filter-btn">Price</button>
                    </div>
                    <div class="sortby">
                        <h3>Sort-by</h3>
                        <button id="sortPriceBtnLh" class="filter-btn">Low - High</button>
                        <button id="sortPriceBtnHl" class="filter-btn">High - Low</button>
                    </div>
                </div>
            </div>
            <div>
                <a class="inspirationB" href="inspiration.html">Inspiration → </a>
            </div>
        </div>

        <section class="productlist-container">
            <article class="product-card">
            </article>
        </section>

        <div class="click-side">
            <p>Viser 1 - 6 ud af 437 produkter</p>
            <a class="productdetailsBsite" href="product.html?id=${product.id}">Se næste side</a>
            <a class="productdetailsBsite123" href="product.html?id=${product.id}"> ❮ 1 2 3 ❯</a>
        </div>
    </main>

    <footer>

    </footer>

    <script src="js/burger.js"></script>
    <script src="js/productlist.js"></script>

</html>
